# ── Upstream: Node.js backend ─────────────────────────────────────────────────
upstream backend {
    server backend:3001;
    keepalive 32;
}

# ── Rate limiting (extra layer on top of express-rate-limit) ──────────────────
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=deploy:10m rate=5r/m;

server {
    listen 80;
    server_name _;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options          "SAMEORIGIN"   always;
    add_header X-Content-Type-Options   "nosniff"      always;
    add_header X-XSS-Protection         "1; mode=block" always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;

    # ── Health check endpoint (served by nginx itself) ────────────────────────
    location = /health {
        access_log off;
        return 200 '{"ok":true}';
        add_header Content-Type application/json;
    }

    # ── Socket.IO — requires WebSocket upgrade ────────────────────────────────
    location /socket.io/ {
        proxy_pass http://backend;

        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;

        # Long timeout — Socket.IO connections are persistent
        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;
        proxy_connect_timeout 10s;

        # Disable buffering for real-time streaming
        proxy_buffering off;
    }

    # ── POST /api/deploy — tighter nginx-level rate limit ────────────────────
    location = /api/deploy {
        limit_req zone=deploy burst=2 nodelay;
        limit_req_status 429;

        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Connection        "";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Needed for multipart PEM uploads (max 16 KB, so 1MB limit is generous)
        client_max_body_size 1m;
        proxy_read_timeout 30s;
    }

    # ── All other API routes ──────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=10 nodelay;
        limit_req_status 429;

        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Connection        "";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        client_max_body_size 1m;
        proxy_read_timeout 60s;

        # Disable buffering for log-streaming endpoints
        proxy_buffering off;
    }

    # ── Static React SPA ──────────────────────────────────────────────────────
    location / {
        root /usr/share/nginx/html;
        index index.html;

        # HTML — no cache so new deploys take effect immediately
        location ~* \.html$ {
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }

        # JS/CSS/assets — aggressive cache (Vite fingerprints filenames)
        location ~* \.(js|css|woff2?|png|svg|ico)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # SPA fallback — all unknown paths → index.html
        try_files $uri $uri/ /index.html;
    }
}
