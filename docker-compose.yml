name: pipeline-dashboard

# ── Usage ─────────────────────────────────────────────────────────────────────
# 1. cp .env.example .env  →  edit SERVER_HOST
# 2. docker compose up -d --build
# 3. Open http://<your-server-ip>
#
# All data is persisted in named Docker volumes.
# To reset everything: docker compose down -v

services:

  # ── Redis — Bull job queue backend ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 64mb
      --maxmemory-policy allkeys-lru
      --save 60 1
      --loglevel warning
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    # Memory hard cap — Redis will not exceed this
    deploy:
      resources:
        limits:
          memory: 96M
        reservations:
          memory: 32M

  # ── Node.js backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV:       production
      PORT:           3001
      REDIS_HOST:     redis
      REDIS_PORT:     6379
      # Allow requests from the nginx frontend container (same-origin via proxy)
      # For multi-domain setups set FRONTEND_URL in .env
      FRONTEND_URL:   ${FRONTEND_URL:-*}
      DB_PATH:        /data/pipeline.db
      OLLAMA_URL:     ${OLLAMA_URL:-http://127.0.0.1:11434}
      OLLAMA_MODEL:   ${OLLAMA_MODEL:-qwen2.5-coder:3b}
      OLLAMA_TIMEOUT: ${OLLAMA_TIMEOUT:-120000}
      GROP_API_KEY:   ${GROP_API_KEY:-}
      GROP_ENDPOINT:  ${GROP_ENDPOINT:-}
      GROP_MODEL:     ${GROP_MODEL:-gpt-4o-mini}
    volumes:
      # SQLite database persisted across container restarts / upgrades
      - sqlite_data:/data
      # /tmp is used for PEM uploads; Docker gives each container its own
      # tmpfs-backed /tmp by default, so PEM files never hit the host disk
    networks:
      - internal
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # ── Nginx — serves React SPA + reverse-proxies /api and /socket.io ─────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Empty = use relative URLs; nginx on the same host proxies them.
        # Only set this if the backend lives on a different domain.
        VITE_API_URL: ${VITE_API_URL:-}
    restart: unless-stopped
    ports:
      - "${PORT:-80}:80"
    networks:
      - internal
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 16M

# ── Persistent volumes ────────────────────────────────────────────────────────
volumes:
  redis_data:
    driver: local
  sqlite_data:
    driver: local

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  internal:
    driver: bridge
    # backend and redis are NOT exposed to the host — only nginx is on port 80
